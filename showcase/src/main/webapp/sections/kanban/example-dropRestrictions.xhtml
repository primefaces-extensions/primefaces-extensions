<ui:composition xmlns="http://www.w3.org/1999/xhtml" xmlns:h="jakarta.faces.html"
    xmlns:ui="jakarta.faces.facelets" xmlns:p="primefaces"
    xmlns:pe="primefaces.extensions" xmlns:f="jakarta.faces.core">

    <style>
        .kanban-board header.kanban-backlog { background-color: #6b7280; color: #fff; }
        .kanban-board header.kanban-inprogress { background-color: #3b82f6; color: #fff; }
        .kanban-board header.kanban-review { background-color: #f59e0b; color: #fff; }
        .kanban-board header.kanban-done { background-color: #10b981; color: #fff; }

        .kanban-board.disabled-board { opacity: 0.3; }
    </style>

    <p:growl id="growl" showDetail="true" showSummary="true">
        <p:autoUpdate />
    </p:growl>

    <div style="margin-bottom:12px; font-size:14px;">
        <p>Items follow a strict workflow: <strong>Backlog</strong> → <strong>In Progress</strong> → <strong>Review</strong> → <strong>Done</strong>. Drops to disallowed columns are automatically rejected.</p>
    </div>

<!-- EXAMPLE-SOURCE-START -->
    <pe:kanban id="kanban"
                widgetVar="kanbanDropRestrictionsWidget"
                value="#{kanbanDropRestrictionsController.columns}"
                draggable="true"
                style="height:450px">
        <p:ajax event="drop" listener="#{kanbanDropRestrictionsController.onDrop}" update="growl" />
    </pe:kanban>
<!-- EXAMPLE-SOURCE-END -->
</ui:composition>
