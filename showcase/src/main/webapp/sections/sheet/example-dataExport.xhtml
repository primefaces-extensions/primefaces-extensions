<ui:composition xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets" xmlns:p="http://primefaces.org/ui"
                xmlns:pe="http://primefaces.org/ui/extensions" xmlns:f="http://xmlns.jcp.org/jsf/core">

    <p:growl id="growl" showDetail="true" showSummary="true">
        <p:autoUpdate/>
    </p:growl>

    <!-- EXAMPLE-SOURCE-START -->
    <p:importEnum type="org.primefaces.extensions.showcase.model.sheet.AssetType" var="AssetType"/>
    <p:importEnum type="org.primefaces.extensions.showcase.model.sheet.PlatformType" var="PlatformType"/>

    <p:toolbar>
        <p:toolbarGroup align="left">
            <p:commandButton icon="pi pi-file" value="CSV">
                <p:dataExporter type="csv" target="sheet" fileName="sheet-export"/>
            </p:commandButton>
            <p:commandButton icon="pi pi-file" value="XML">
                <p:dataExporter type="xml" target="sheet" fileName="sheet-export"/>
            </p:commandButton>
        </p:toolbarGroup>
    </p:toolbar>

    <pe:sheet id="sheet" widgetVar="sheetWidget" value="#{sheetExportController.assets}" var="row"
              height="400" rowKey="#{row.assetId}" fixedCols="2" showRowHeaders="true"
              resizableCols="true" filteredValue="#{sheetExportController.filteredAssets}"
              sortBy="#{row.assetId}" sortOrder="ascending">

        <f:facet name="header">
            <h:outputText value="Assets"/>
        </f:facet>

        <f:facet name="footer">
            <h:outputText id="footer" value="#{sheetExportController.filteredAssets.size()} Records"/>
        </f:facet>

        <pe:sheetcolumn headerText="Id" readOnly="true" value="#{row.assetId}"
                        sortBy="#{row.assetId}" colWidth="100"/>
        <pe:sheetcolumn headerText="Type" value="#{row.assetType}" colWidth="120"
                        sortBy="#{row.assetType}" filterBy="#{row.assetType}"
                        colType="dropdown" selectItems="#{AssetType.ALL_VALUES}"/>
        <pe:sheetcolumn headerText="Platform" value="#{row.platform}" colWidth="120"
                        sortBy="#{row.platform}" filterBy="#{row.platform}"
                        colType="autocomplete" selectItems="#{PlatformType.ALL_VALUES}"
                        autoCompleteStrict="false" autoCompleteVisibleRows="4"/>
        <pe:sheetcolumn headerText="Active" value="#{row.active}" colWidth="80" colType="checkbox"/>
        <pe:sheetcolumn headerText="Price" value="#{row.purchasePrice}" colWidth="120"
                        colType="numeric" numericLocale="de-DE" numericPattern="$0,0.00">
            <f:converter converterId="javax.faces.BigDecimal"/>
        </pe:sheetcolumn>
        <pe:sheetcolumn headerText="Date" value="#{row.purchaseDate}" colWidth="120"
                        sortBy="#{row.purchaseDate}" colType="date" dateFormat="YYYY-MM-DD">
            <f:convertDateTime type="date" pattern="yyyy-MM-dd"/>
        </pe:sheetcolumn>
    </pe:sheet>

    <!-- EXAMPLE-SOURCE-END -->
</ui:composition>
